# SwiftLint Configuration for ClipboardManager

# Paths to include/exclude
included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData

# Rules to disable
disabled_rules:
  - trailing_whitespace  # Let formatters handle this
  - todo  # TODOs are okay during development

# Rules to enable (opt-in)
opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - implicit_return
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# Rule configurations
line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 2
  statement_level:
    warning: 5

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - db
    - at
    - to
    - by
    - on
    - in
    - up
    - x
    - y

type_name:
  min_length: 3
  max_length: 50
  excluded:
    - ID

# Number of function parameters
function_parameter_count:
  warning: 6
  error: 8

# Severity overrides
force_cast: error
force_try: error
force_unwrapping: warning

# Custom rules
custom_rules:
  no_print:
    name: "No Print Statements"
    regex: '^\s*print\('
    match_kinds:
      - identifier
    message: "Use AppLogger instead of print()"
    severity: warning
  
  no_nslog:
    name: "No NSLog"
    regex: '^\s*NSLog\('
    match_kinds:
      - identifier
    message: "Use AppLogger instead of NSLog()"
    severity: warning

# Minimum Swift version
swift_version: "5.5"

# Reporter type
reporter: "xcode"
